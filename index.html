<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار القدرات اللفظية - الأستاذ عبدالعزيز الفيفي</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --correct: #27ae60;
            --wrong: #e74c3c;
            --passage-bg: #fffde7;
            --light-bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .school-name { color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        
        .passage-box {
            background-color: var(--passage-bg);
            border: 2px solid #fff59d;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 1.1rem;
            color: #444;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-align: right;
        }

        .option-btn:hover { border-color: var(--accent); background: #f0f8ff; }
        .option-btn.correct { background-color: var(--correct) !important; color: white; border-color: var(--correct); }
        .option-btn.wrong { background-color: var(--wrong) !important; color: white; border-color: var(--wrong); }

        .next-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 25px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .summary-table th, .summary-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        .summary-table th { background: var(--primary); color: white; }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #7f8c8d;
        }

        .hidden { display: none; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0;">اختبار القدرات اللفظية الرقمي</h2>
        <div class="school-name">ثانوية الأمير عبد المجيد</div>
        <div style="font-weight: 500;">إعداد الأستاذ: عبدالعزيز الفيفي</div>
    </header>

    <div id="quiz-section">
        <div id="passage-container" class="passage-box hidden">
            <strong>نص الاستيعاب:</strong><br>
            <span id="passage-text"></span>
        </div>

        <div class="question-box">
            <div id="question-text" class="question-text"></div>
            <div id="options-container" class="options-grid"></div>
        </div>

        <button id="btn-next" class="next-btn hidden" onclick="nextStep()">السؤال التالي</button>
    </div>

    <div id="result-section" class="hidden">
        <h2 style="text-align:center;">ملخص الأداء النهائي</h2>
        <p style="text-align:center; font-size: 1.2rem;">درجتك هي: <span id="score-display"></span> من <span id="total-display"></span></p>
        <table class="summary-table">
            <thead>
                <tr>
                    <th>السؤال</th>
                    <th>إجابتك</th>
                    <th>النتيجة</th>
                </tr>
            </thead>
            <tbody id="summary-body"></tbody>
        </table>
        <button class="next-btn" onclick="location.reload()">إعادة الاختبار</button>
    </div>

    <footer>
        جميع حقوق الحفظ محفوظة &copy; 2026 - الأستاذ عبدالعزيز الفيفي
    </footer>
</div>

<script>
    const quizData = [
        { q: "حمص : عدس", options: ["صحن : قدر", "طريق : سيارة", "ضوء : شمس", "مطرقة : مسمار"], correct: 0, type: "analog" },
        { q: "صلاة : إسلام", options: ["عمود : مبنى", "غصن : شجرة", "جدار : منزل", "ماء : جسر"], correct: 0, type: "analog" },
        { q: "قناعة : انشراح", options: ["محاكاة : مخالفة", "الحاجة : اختراع", "محاكاة : اختراع", "مخالفة : حاجة"], correct: 1, type: "analog" },
        { q: "صياح : ديك", options: ["عويل : ذئب", "رنين : جرس", "نعيق : الغزال", "نباح : الحمار"], correct: 1, type: "analog" },
        { q: "سيارة : بنزين", options: ["مقال : فقرة", "خيمة : أوتاد", "قلم : حبر", "خاتم : ذهب"], correct: 2, type: "analog" },
        { q: "علم : سارية", options: ["إناء : حافظة", "سماء : نجم", "تاج : رأس", "جبل : شجر"], correct: 2, type: "analog" },
        { q: "ساير : وافق", options: ["صافح : سامح", "استيطان : خوف", "دعم : ساند", "عفا : غفر"], correct: 2, type: "analog" },
        { q: "سكن : شقة", options: ["مرض : جدري", "خشب : حديد", "سماء : هواء", "مطبخ : طعام"], correct: 0, type: "analog" },
        { q: "اكتئاب : حزن", options: ["رياضة : سعادة", "جبل : شاهق", "زبيب : عنب", "حزن : خجل"], correct: 0, type: "analog" },
        // قسم الاستيعاب المقروء (مثال من الملف)
        { 
            passage: "يعتبر التعليم الرقمي وسيلة حديثة لتبادل المعرفة تهدف إلى تحسين جودة التعليم وتوفير الوقت والمجهود للمتعلم والمعلم على حد سواء.",
            q: "الهدف الرئيسي من التعليم الرقمي حسب النص:",
            options: ["توفير الوقت والمجهود", "بيع الأجهزة", "الاستغناء عن المعلم", "تقليل عدد المدارس"],
            correct: 0, 
            type: "reading" 
        }
    ];

    let currentIndex = 0;
    let score = 0;
    let results = [];

    function loadQuestion() {
        const data = quizData[currentIndex];
        const passageContainer = document.getElementById('passage-container');
        const optionsContainer = document.getElementById('options-container');
        const btnNext = document.getElementById('btn-next');

        btnNext.classList.add('hidden');
        document.getElementById('question-text').innerText = `س${currentIndex + 1}: ${data.q}`;
        
        if (data.type === "reading") {
            passageContainer.classList.remove('hidden');
            document.getElementById('passage-text').innerText = data.passage;
        } else {
            passageContainer.classList.add('hidden');
        }

        optionsContainer.innerHTML = '';
        data.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(idx, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(idx, btn) {
        const data = quizData[currentIndex];
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none');

        if (idx === data.correct) {
            btn.classList.add('correct');
            score++;
            results.push({ q: data.q, user: data.options[idx], status: "✅" });
        } else {
            btn.classList.add('wrong');
            allBtns[data.correct].classList.add('correct');
            results.push({ q: data.q, user: data.options[idx], status: "❌" });
        }
        document.getElementById('btn-next').classList.remove('hidden');
    }

    function nextStep() {
        currentIndex++;
        if (currentIndex < quizData.length) {
            loadQuestion();
        } else {
            showSummary();
        }
    }

    function showSummary() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('score-display').innerText = score;
        document.getElementById('total-display').innerText = quizData.length;

        const body = document.getElementById('summary-body');
        results.forEach(res => {
            body.innerHTML += `<tr><td>${res.q}</td><td>${res.user}</td><td>${res.status}</td></tr>`;
        });
    }

    loadQuestion();
</script>
</body>
</html>
