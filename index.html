<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار القدرات اللفظية - الأستاذ عبدالعزيز الفيفي</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --correct: #27ae60;
            --wrong: #e74c3c;
            --light-bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            margin: 0;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .school-name { color: var(--accent); font-weight: bold; margin: 5px 0; }
        
        .question-box { margin-bottom: 20px; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            text-align: right;
        }

        .option-btn.correct { background-color: var(--correct) !important; color: white; border-color: var(--correct); }
        .option-btn.wrong { background-color: var(--wrong) !important; color: white; border-color: var(--wrong); }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .summary-table th, .summary-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        .summary-table th { background: var(--primary); color: white; }

        .next-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>اختبار القدرات اللفظية</h2>
        <div class="school-name">ثانوية الأمير عبد المجيد</div>
        <div>إعداد الأستاذ: عبدالعزيز الفيفي</div>
    </header>

    <div id="quiz-ui">
        <div class="question-box">
            <p id="question-text" style="font-weight: bold; font-size: 1.2rem;"></p>
            <div id="options-container" class="options-grid"></div>
        </div>
        <button id="btn-next" class="next-btn hidden" onclick="handleNext()">السؤال التالي</button>
    </div>

    <div id="result-ui" class="hidden">
        <h2 style="text-align: center;">نتيجتك النهائية: <span id="final-score"></span> من <span id="total-questions"></span></h2>
        <table class="summary-table">
            <thead>
                <tr>
                    <th>السؤال</th>
                    <th>إجابتك</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="summary-body"></tbody>
        </table>
        <button class="next-btn" onclick="location.reload()">إعادة الاختبار</button>
    </div>

    <footer style="text-align: center; margin-top: 30px; font-size: 0.9rem; color: #7f8c8d;">
        جميع حقوق الحفظ محفوظة &copy; 2026 - الأستاذ عبدالعزيز الفيفي
    </footer>
</div>

<script>
    [span_0](start_span)// الأسئلة مستخرجة بالنص الكامل من ملف "تجميعات لفظي 202649.pdf"[span_0](end_span)
    const questions = [
        [span_1](start_span){ q: "حمص : عدس", options: ["صحن قدر", "طريق سيارة", "ضوء شمس", "مطرقة: مسمار"], correct: 0 }, //[span_1](end_span)
        [span_2](start_span){ q: "صلاة: إسلام", options: ["عمود مبنی", "غصن شجرة", "جدار منزل", "ماء: جسر"], correct: 0 }, //[span_2](end_span)
        [span_3](start_span){ q: "قناعة انشراح", options: ["محاكاة مخالفة", "الحاجة اختراع", "محاكاة اختراع", "مخالفة حاجة"], correct: 1 }, //[span_3](end_span)
        [span_4](start_span){ q: "صياح ديك", options: ["عويل : ذئب", "رنين جرس", "نعيق الغزال", "نباح: الحمار"], correct: 1 }, //[span_4](end_span)
        [span_5](start_span){ q: "سيارة بنزين", options: ["مقال: فقرة", "خيمة: أوتاد", "قلم حبر", "خاتم ذهب"], correct: 2 }, //[span_5](end_span)
        [span_6](start_span){ q: "علم: سارية", options: ["إناء : حافظة", "سماء: نجم", "تاج رأس", "جبل: شجر"], correct: 2 }, //[span_6](end_span)
        [span_7](start_span){ q: "سایر وافق", options: ["صافح سامح", "استيطان خوف", "دعم ساند", "عفا غفر"], correct: 2 }, //[span_7](end_span)
        [span_8](start_span){ q: "سكن: شقة", options: ["مرض جدري", "خشب حديد", "سماء: هواء", "مطبخ طعام"], correct: 0 }, //[span_8](end_span)
        [span_9](start_span){ q: "اكتئاب حزن", options: ["رياضة سعادة", "جبل شاهق", "زبيب عنب", "حزن خجل"], correct: 0 } //[span_9](end_span)
    ];

    let currentIndex = 0;
    let userAnswers = [];
    let score = 0;

    function renderQuestion() {
        const data = questions[currentIndex];
        document.getElementById('question-text').innerText = `س${currentIndex + 1}: ${data.q}`;
        
        const optionsDiv = document.getElementById('options-container');
        optionsDiv.innerHTML = '';
        
        data.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            optionsDiv.appendChild(btn);
        });
        document.getElementById('btn-next').classList.add('hidden');
    }

    function checkAnswer(selectedIdx, btn) {
        const correctIdx = questions[currentIndex].correct;
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none');

        if (selectedIdx === correctIdx) {
            btn.classList.add('correct');
            score++;
            userAnswers.push({ q: questions[currentIndex].q, status: '✅ صحيح', userAns: questions[currentIndex].options[selectedIdx] });
        } else {
            btn.classList.add('wrong');
            allBtns[correctIdx].classList.add('correct');
            userAnswers.push({ q: questions[currentIndex].q, status: '❌ خطأ', userAns: questions[currentIndex].options[selectedIdx] });
        }
        document.getElementById('btn-next').classList.remove('hidden');
    }

    function handleNext() {
        currentIndex++;
        if (currentIndex < questions.length) {
            renderQuestion();
        } else {
            showFinalResult();
        }
    }

    function showFinalResult() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('result-ui').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        document.getElementById('total-questions').innerText = questions.length;

        const body = document.getElementById('summary-body');
        userAnswers.forEach(ans => {
            const row = `<tr><td>${ans.q}</td><td>${ans.userAns}</td><td>${ans.status}</td></tr>`;
            body.innerHTML += row;
        });
    }

    renderQuestion();
</script>
</body>
</html>
