<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بنك أسئلة القدرات اللفظية الكامل - 30 سؤالاً</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; direction: rtl; }
        .quiz-container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #3498db; margin-bottom: 25px; padding-bottom: 10px; }
        .question-box { margin-bottom: 25px; display: none; }
        .active { display: block; }
        .question-title { font-size: 1.25rem; font-weight: bold; color: #2c3e50; margin-bottom: 15px; background: #e8f4fd; padding: 10px; border-right: 5px solid #3498db; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-btn { padding: 12px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; text-align: right; font-size: 1.05rem; transition: 0.3s; }
        .option-btn:hover { border-color: #3498db; background: #f0f8ff; }
        .correct { background-color: #27ae60 !important; color: white; border-color: #27ae60; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #e74c3c; }
        .nav-btns { margin-top: 25px; text-align: center; }
        button.nav { padding: 10px 25px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: none; background: #2c3e50; color: white; }
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .summary-table th, .summary-table td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .footer { margin-top: 30px; text-align: center; color: #7f8c8d; font-size: 0.9rem; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h2>اختبار تجميعات اللفظي 2026</h2>
        <p>إعداد الأستاذ: عبدالعزيز الفيفي</p>
    </div>

    <div id="quiz-body">
        </div>

    <div id="results-area" style="display:none;">
        <h3 style="text-align:center;">نتائج الاختبار النهائية</h3>
        <table class="summary-table">
            <thead><tr><th>رقم السؤال</th><th>النتيجة</th></tr></thead>
            <tbody id="results-table-body"></tbody>
        </table>
        <button class="nav" style="width:100%; margin-top:15px;" onclick="location.reload()">إعادة الاختبار</button>
    </div>

    <div class="nav-btns" id="nav-controls">
        <button class="nav" id="next-btn" onclick="nextQuestion()">السؤال التالي</button>
    </div>

    <div class="footer">جميع الحقوق محفوظة &copy; 2026 - مدرسة الأمير عبد المجيد الثانوية</div>
</div>

<script>
    const questions = [
        { q: "حمص : عدس", options: ["أ) صحن : قدر", "ب) طريق : سيارة", "ج) ضوء : شمس", "د) مطرقة : مسمار"], correct: 0 },
        { q: "صلاة : إسلام", options: ["أ) عمود : مبنى", "ب) غصن : شجرة", "ج) جدار : منزل", "د) ماء : جسر"], correct: 0 },
        { q: "قناعة : انشراح", options: ["أ) محاكاة : مخالفة", "ب) الحاجة : اختراع", "ج) محاكاة : اختراع", "د) مخالفة : حاجة"], correct: 1 },
        { q: "صياح : ديك", options: ["أ) عويل : ذئب", "ب) رنين : جرس", "ج) نعيق : الغزال", "د) نباح : الحمار"], correct: 1 },
        { q: "سيارة : بنزين", options: ["أ) مقال : فقرة", "ب) خيمة : أوتاد", "ج) قلم : حبر", "د) خاتم : ذهب"], correct: 2 },
        { q: "علم : سارية", options: ["أ) إناء : حافظة", "ب) سماء : نجم", "ج) تاج : رأس", "د) جبل : شجر"], correct: 2 },
        { q: "ساير : وافق", options: ["أ) صافح : سامح", "ب) استيطان : خوف", "ج) دعم : ساند", "د) عفا : غفر"], correct: 2 },
        { q: "سكن : شقة", options: ["أ) مرض : جدري", "ب) خشب : حديد", "ج) سماء : هواء", "د) مطبخ : طعام"], correct: 0 },
        { q: "اكتئاب : حزن", options: ["أ) رياضة : سعادة", "ب) جبل : شاهق", "ج) زبيب : عنب", "د) حزن : خجل"], correct: 0 },
        { q: "لا يوجد حادث بدون ........", options: ["أ) الأشخاص", "ب) السيارات", "ج) سبب", "د) نظرية"], correct: 2 },
        { q: "يكرم الرجل بـ ......... والصمت ........", options: ["أ) الحكمة - الجميل", "ب) الجمال - خير", "ج) المال - نقمة", "د) اللؤم - شديد"], correct: 0 },
        { q: "الاستخفاف من الجدية يسبب ....... والاستخفاف من الهزل يسبب .......", options: ["أ) الارتباك - النجاح", "ب) الضعف - الإنجاز", "ج) الفوضى - التوازن", "د) الخيبة - الحماس"], correct: 1 },
        { q: "أشد الناس ....... أقواهم اعتقاداً في فضل نفسه وأثبت الناس ....... أشدهم اتهاماً لنفسه.", options: ["أ) حماقة - عقلاً", "ب) غضباً - هدوءاً", "ج) عدواً - صديقاً", "د) عالماً - جاهلاً"], correct: 0 },
        { q: "الشخص ....... هو كثير الاعتقاد في فضل نفسه، والشخص ....... الذي يتهم نفسه.", options: ["أ) الأحمق - العاقل", "ب) المغرور - المتواضع", "ج) الأناني - المتسامح", "د) المتكبر - المتفكر"], correct: 0 },
        { q: "إذا تذكرت ....... فتذكر تاريخك المشرق لتفرح، وإذا ذكرت ....... فاذكر إنجازاتك لتسعد وإذا ذكرت الغد فتذكر أحلامك للتفاؤل.", options: ["أ) الأحزان - الكروب", "ب) الماضي - يومك", "ج) السالف - الآتي", "د) تهتكك - محاسنك"], correct: 0 },
        { q: "الغفوة في ضوء الشموع وأمامك كتاب مفتوح في حوار مع أشخاص من أجيال لم تعاصرهم هي المتعة التي ليس لها مثيل. الكلمة الشاذة هي:", options: ["أ) الغفوة", "ب) الشموع", "ج) حوار", "د) لم"], correct: 0 },
        { q: "عندما يفوز الفريق يفرح مشجعوه، ولكن عندما يخسر يشعر منافسوه بشعور سيء. الكلمة الشاذة هي:", options: ["أ) يفوز", "ب) يخسر", "ج) منافسوه", "د) سيء"], correct: 2 },
        { q: "من زاد حياؤه، زاد سروره، وهان على الناس. الكلمة الشاذة هي:", options: ["أ) زاد", "ب) سروره", "ج) هان", "د) الناس"], correct: 2 },
        { q: "الكلمة التي تخرج من الفم لا يمكن استردادها، والفرصة التي تضيع لا يمكن تعويضها. الكلمة الشاذة هي:", options: ["أ) الفم", "ب) استردادها", "ج) تضيع", "د) تعويضها"], correct: 3 },
        { q: "إن من بواعث التفاؤل أن ترى كل شيء حولك يبعث على الأمل، فتفاءلوا بالخير تجدوه. الكلمة الشاذة هي:", options: ["أ) بواعث", "ب) التفاؤل", "ج) الأمل", "د) تجدوه"], correct: 3 },
        { q: "المؤمن كالنحلة، لا تأكل إلا طيباً، ولا تضع إلا طيباً. الكلمة الشاذة هي:", options: ["أ) المؤمن", "ب) تأكل", "ج) تضع", "د) طيباً"], correct: 0 },
        { q: "لا يتم عمل والنية غائبة، ولا يتم قول والعمل غائب. الكلمة الشاذة هي:", options: ["أ) عمل", "ب) النية", "ج) غائبة", "د) غائب"], correct: 0 },
        { q: "الصديق الحقيقي هو الذي يسندك في وقت الشدة، ويقف بجانبك في السراء والضراء. الكلمة الشاذة هي:", options: ["أ) الحقيقي", "ب) يسندك", "ج) الشدة", "د) السراء"], correct: 3 },
        { q: "الوقت كالسيف، إن لم تقطعه قطعك، فاحرص على استثماره فيما ينفعك. الكلمة الشاذة هي:", options: ["أ) كالسيف", "ب) تقطعه", "ج) استثماره", "د) ينفعك"], correct: 3 },
        { q: "النجاح يبدأ بخطوة، والاستمرار فيه يتطلب الصبر والعزيمة. الكلمة الشاذة هي:", options: ["أ) يبدأ", "ب) الاستمرار", "ج) الصبر", "د) العزيمة"], correct: 2 },
        { q: "القراءة تفتح آفاق العقل، وتنمي الفكر، وتجعل الإنسان مطلعاً على الثقافات. الكلمة الشاذة هي:", options: ["أ) تفتح", "ب) تنمي", "ج) مطلعاً", "د) الثقافات"], correct: 3 },
        { q: "العلم نور والجهل ظلام، فاحرص على طلب العلم لتنير دربك. الكلمة الشاذة هي:", options: ["أ) نور", "ب) ظلام", "ج) طلب", "د) دربك"], correct: 0 },
        { q: "العمل الجاد هو السبيل الوحيد لتحقيق الأحلام، والوصول إلى القمة. الكلمة الشاذة هي:", options: ["أ) الجاد", "ب) السبيل", "ج) الأحلام", "د) القمة"], correct: 0 },
        { q: "الابتسامة لغة لا تحتاج إلى ترجمة، فهي تدخل القلوب بدون استئذان. الكلمة الشاذة هي:", options: ["أ) لغة", "ب) ترجمة", "ج) تدخل", "د) استئذان"], correct: 2 },
        { q: "الأخلاق الكريمة هي زينة الإنسان، وبها يرتقي في أعين الناس. الكلمة الشاذة هي:", options: ["أ) الكريمة", "ب) زينة", "ج) يرتقي", "د) أعين"], correct: 1 }
    ];

    let currentIdx = 0;
    let userResults = [];

    function renderQuestions() {
        const container = document.getElementById('quiz-body');
        questions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `question-box ${index === 0 ? 'active' : ''}`;
            div.id = `q-block-${index}`;
            div.innerHTML = `
                <div class="question-title">س${index + 1}: ${item.q}</div>
                <div class="options-grid">
                    ${item.options.map((opt, i) => `
                        <button class="option-btn" onclick="checkAnswer(${index}, ${i}, this)">${opt}</button>
                    `).join('')}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function checkAnswer(qIdx, choiceIdx, btn) {
        const correctIdx = questions[qIdx].correct;
        const btns = document.querySelectorAll(`#q-block-${qIdx} .option-btn`);
        btns.forEach(b => b.style.pointerEvents = 'none');

        if (choiceIdx === correctIdx) {
            btn.classList.add('correct');
            userResults.push("✅");
        } else {
            btn.classList.add('wrong');
            btns[correctIdx].classList.add('correct');
            userResults.push("❌");
        }
    }

    function nextQuestion() {
        if (userResults.length <= currentIdx) {
            alert("يرجى اختيار إجابة أولاً");
            return;
        }
        document.getElementById(`q-block-${currentIdx}`).classList.remove('active');
        currentIdx++;
        if (currentIdx < questions.length) {
            document.getElementById(`q-block-${currentIdx}`).classList.add('active');
        } else {
            showFinalResults();
        }
    }

    function showFinalResults() {
        document.getElementById('nav-controls').style.display = 'none';
        document.getElementById('results-area').style.display = 'block';
        const tbody = document.getElementById('results-table-body');
        userResults.forEach((res, i) => {
            tbody.innerHTML += `<tr><td>سؤال ${i+1}</td><td>${res}</td></tr>`;
        });
    }

    renderQuestions();
</script>
</body>
</html>
